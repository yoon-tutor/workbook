<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__DOCUMENT_TITLE__</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --primary: #1d1d1f;
        --primary-focus: #333333;
        --point: #d71920;
        --point-soft: #fff5f5;
        --point-border: rgba(215, 25, 32, 0.28);
        --ink: #1d1d1f;
        --ink-soft: #333333;
        --muted: #7a7a7a;
        --canvas: #ffffff;
        --parchment: #f5f5f7;
        --pearl: #fafafc;
        --guide: #f7f7f9;
        --answer-bg: #fffdf7;
        --hairline: #e0e0e0;
        --divider: #f0f0f0;
        --blue: #4f8fd6;
        --green: #5aa884;
        --violet: #9b7ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--parchment);
        color: var(--ink);
        font-family: "Noto Sans KR";
      }

      .screen-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        min-height: 52px;
        padding: 10px 24px;
        background: rgba(245, 245, 247, 0.86);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(16px);
      }

      .screen-title {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        line-height: 1.24;
        letter-spacing: 0;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 9999px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        padding: 8px 17px;
        transition: transform 120ms ease;
      }

      button:active {
        transform: scale(0.95);
      }

      button:focus-visible {
        outline: 2px solid var(--primary-focus);
        outline-offset: 2px;
      }

      main {
        display: grid;
        gap: 24px;
        padding: 24px;
      }

      .page {
        width: 210mm;
        height: 297mm;
        margin: 0 auto;
        padding: 5mm;
        background: var(--canvas);
        border: 1px solid var(--hairline);
        overflow: hidden;
      }

      .sheet {
        display: flex;
        flex-direction: column;
        gap: 2mm;
        height: 100%;
      }

      .masthead {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6mm;
        align-items: center;
        padding-bottom: 1.8mm;
        border-bottom: 1px solid var(--hairline);
      }

      .mast-meta {
        display: flex;
        align-items: center;
        gap: 1.8mm;
        min-width: 0;
      }

      .lesson-chip,
      .grade-chip,
      .stage-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 5.4mm;
        padding: 0.65mm 2.2mm;
        border: 1px solid var(--hairline);
        color: var(--ink);
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
      }

      .lesson-chip {
        background: var(--point);
        border-color: var(--point);
        color: #ffffff;
      }

      .grade-chip,
      .stage-chip {
        background: var(--point-soft);
        border-color: var(--point-border);
        color: var(--point);
      }

      .kicker {
        overflow: hidden;
        color: var(--ink-soft);
        font-size: 10px;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .step-title {
        color: var(--point);
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: 0;
        text-align: right;
        white-space: nowrap;
      }

      .instruction {
        display: block;
        padding: 1.2mm 0;
      }

      .instruction-text {
        margin: 0;
        color: var(--ink-soft);
        font-size: 10px;
        font-weight: 700;
        line-height: 1.25;
      }

      .study-summary {
        display: grid;
        gap: 1.2mm;
      }

      .topic-line {
        display: grid;
        grid-template-columns: 25mm 1fr;
        gap: 2mm;
        align-items: end;
        padding: 1.5mm 2mm;
        background: var(--pearl);
        border: 1px solid var(--hairline);
      }

      .topic-label {
        color: var(--primary);
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
      }

      .topic-write {
        min-height: 4mm;
        color: var(--ink);
        font-size: 9.5px;
        font-weight: 600;
        line-height: 1.25;
        border-bottom: 1px solid var(--hairline);
      }

      .answer-line {
        display: grid;
        grid-template-columns: 25mm 1fr 24mm;
        gap: 2mm;
        align-items: center;
        padding: 1.5mm 2mm;
        background: var(--answer-bg);
        border: 1px solid var(--hairline);
      }

      .answer-label {
        color: var(--ink);
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
      }

      .answer-write {
        min-height: 4mm;
        color: var(--point);
        font-size: 10px;
        font-weight: 700;
        line-height: 1.25;
        border-bottom: 1px solid var(--hairline);
      }

      .answer-check {
        color: var(--muted);
        font-size: 9px;
        font-weight: 700;
        line-height: 1.15;
        text-align: right;
      }

      .work-area {
        flex: 0 0 auto;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--hairline);
      }

      .meaning-work-area {
        border: 0;
      }

      .item-work-area {
        border: 0;
      }

      .meaning-board {
        display: grid;
        grid-template-rows: auto auto;
        border: 1px solid var(--hairline);
      }

      .meaning-board-head,
      .meaning-row {
        display: grid;
        grid-template-columns: 10mm minmax(0, 1fr);
      }

      .meaning-board-head {
        background: var(--pearl);
        border-bottom: 1px solid var(--hairline);
        color: var(--ink-soft);
        font-size: 10px;
        font-weight: 600;
      }

      .meaning-board-head div,
      .meaning-cell {
        padding: 1.23mm 1.45mm;
        border-right: 1px solid var(--divider);
      }

      .meaning-board-head div {
        display: grid;
        align-items: center;
      }

      .meaning-board-head div:first-child {
        justify-items: center;
        text-align: center;
      }

      .meaning-board-head div:last-child,
      .meaning-cell:last-child {
        border-right: 0;
      }

      .meaning-list {
        display: grid;
        align-content: start;
        min-height: 0;
      }

      .meaning-row {
        min-height: 15.6mm;
        border-bottom: 1px solid var(--divider);
      }

      .meaning-row:last-child {
        border-bottom: 0;
      }

      .unit-no {
        display: grid;
        place-items: center;
        color: var(--primary);
        font-size: 11px;
        font-weight: 600;
        text-align: center;
      }

      .text-cell {
        min-width: 0;
        padding: 1.9mm 2mm;
      }

      .item-list {
        display: grid;
        align-content: start;
        gap: 3pt;
        min-height: 0;
      }

      .practice-item {
        display: grid;
        grid-template-columns: 8mm minmax(0, 1fr);
        border: 1px solid var(--hairline);
      }

      .item-no {
        display: grid;
        place-items: center;
        padding: 2.5pt 1mm;
        background: var(--guide);
        color: var(--ink-soft);
        font-size: 10px;
        font-weight: 700;
        line-height: 1.2;
        text-align: center;
      }

      .item-main {
        display: grid;
        gap: 1mm;
        min-width: 0;
        padding: 2.5pt 1.9mm;
      }

      .reading-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 0.82fr);
        gap: 3mm;
      }

      .reading-grid .korean {
        padding-left: 3mm;
        border-left: 1px solid var(--divider);
      }

      .field-row {
        display: grid;
        gap: 0.8mm;
      }

      .field-label,
      .bank-label,
      .write-label {
        color: var(--muted);
        font-size: 8.4px;
        font-weight: 700;
        line-height: 1;
      }

      .english {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text";
        font-size: 11pt;
        font-weight: 400;
        line-height: 1.32;
        letter-spacing: 0;
        text-align: left;
      }

      .korean,
      .hint,
      .prompt,
      .paragraph {
        margin: 0;
        font-family: "Noto Sans KR";
        color: var(--ink);
        font-size: 10pt;
        font-weight: 400;
        line-height: 1.32;
        letter-spacing: 0;
        text-align: left;
      }

      .english strong,
      .korean strong,
      .hint strong,
      .prompt strong,
      .paragraph strong {
        font-weight: inherit;
        text-decoration: none;
      }

      .meaning-board .english strong,
      .meaning-board .korean strong,
      .meaning-board .hint strong,
      .meaning-board .prompt strong,
      .meaning-board .paragraph strong {
        font-weight: 700;
      }

      .meaning-hint-cell {
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 0.6mm;
      }

      .lines {
        display: grid;
        gap: 0.9mm;
        align-content: end;
      }

      .meaning-board .english strong {
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.16em;
      }

      .blank {
        display: inline-block;
        min-width: 18mm;
        height: 1em;
        border-bottom: 1px solid var(--ink);
        vertical-align: -0.05em;
      }

      .word-bank {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 1.5mm;
        align-items: center;
        min-height: 5.4mm;
        padding: 0.7mm 1.4mm;
        background: var(--guide);
      }

      .bank-text {
        color: var(--ink-soft);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text";
        font-size: 9.4px;
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: 0;
        text-align: center;
      }

      .validation-panel {
        padding: 8mm;
        color: var(--point);
        font-family: "Noto Sans KR";
      }

      .validation-panel h1 {
        margin: 0 0 4mm;
        font-size: 15pt;
        line-height: 1.3;
      }

      .validation-panel li {
        margin: 0 0 2mm;
        font-size: 10pt;
        line-height: 1.4;
      }

      .write-box {
        display: grid;
        gap: 5.8mm;
        align-content: end;
        min-height: var(--answer-height, 14mm);
        padding: 2pt 1mm;
      }

      .write-line {
        height: 1px;
        border-bottom: 1px solid var(--hairline);
      }

      .correction-passage {
        padding: 2.4mm 2.8mm;
        border-bottom: 1px solid var(--divider);
      }

      .correction-rows {
        display: grid;
        gap: 5.2mm;
        padding: 3mm 5mm;
      }

      .correction-row {
        display: grid;
        grid-template-columns: auto 1fr auto 1fr;
        gap: 2.2mm;
        align-items: end;
      }

      .correction-no,
      .arrow {
        color: var(--ink-soft);
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      .paragraph-list {
        display: grid;
        gap: 1.7mm;
        padding: 2.4mm 2.8mm;
      }

      .paragraph-block {
        display: grid;
        grid-template-columns: 7mm 1fr;
        gap: 1.4mm;
      }

      .paragraph-label {
        color: var(--primary);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text";
        font-size: 10px;
        font-weight: 700;
        line-height: 1.32;
      }

      .sequence-row {
        display: flex;
        justify-content: center;
        gap: 3mm;
        padding: 5mm 0 2mm;
      }

      .sequence-slot {
        width: 26mm;
        border-bottom: 1px solid var(--ink);
      }

      .sequence-arrow {
        color: var(--ink-soft);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .footer {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        flex: 0 0 6.4mm;
        min-height: 6.4mm;
        margin-top: auto;
        padding-top: 1.1mm;
        border-top: 1px solid var(--divider);
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        line-height: 1;
      }

      .footer-logo-mark {
        display: block;
        width: 16mm;
        height: auto;
        margin-left: auto;
        opacity: 0.72;
        object-fit: contain;
      }


      .vocab {
        font-weight: inherit;
        color: inherit;
      }

      .answer-fill {
        color: inherit;
        font-weight: inherit;
        text-decoration: none;
      }

      .solution,
      .filled-answer,
      .solution-text,
      .solution-line,
      .solution-slot {
        color: var(--point);
        font-weight: 700;
      }

      .filled-answer {
        display: inline-block;
        min-width: 14mm;
        padding: 0 0.8mm;
        border-bottom: 1px solid var(--point);
        text-align: center;
        vertical-align: -0.05em;
      }

      .solution-box {
        display: grid;
        align-content: center;
        min-height: var(--answer-height, 14mm);
        padding: 2pt 1mm;
        border-top: 1px solid var(--divider);
      }

      .solution-text {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text";
        font-size: 10pt;
        line-height: 1.32;
        letter-spacing: 0;
      }

      .solution-line {
        min-height: 4.4mm;
        border-bottom: 1px solid var(--point-border);
      }

      .solution-slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 26mm;
        min-height: 4.4mm;
        border-bottom: 1px solid var(--point);
      }

      .meaning-board .vocab {
        font-weight: 700;
      }

      .meaning-board .answer-fill {
        color: inherit;
        font-weight: inherit;
        text-decoration: none;
      }

      .meaning-board .english .gloss {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 0.15mm;
        line-height: 1;
        vertical-align: baseline;
        white-space: nowrap;
      }

      .meaning-board .english .gloss::after {
        content: attr(data-meaning);
        color: inherit;
        font-size: 6pt;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0;
      }

      .meaning-board .vocab-1 { color: var(--blue); }
      .meaning-board .vocab-2 { color: var(--ink); }
      .meaning-board .vocab-3 { color: var(--green); }
      .meaning-board .vocab-4 { color: var(--ink); }
      .meaning-board .vocab-5 { color: var(--violet); }
      .meaning-board .vocab-6 { color: var(--ink); }
      .meaning-board .vocab-7 { color: #5d9fc7; }
      .meaning-board .vocab-8 { color: #88a85a; }

      .english.inline-gloss {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        column-gap: 1.05mm;
        row-gap: 1.6mm;
        padding: 0;
      }

      .unit-chunk {
        display: inline-flex;
        flex: 0 1 auto;
        max-width: 100%;
        align-items: flex-start;
      }

      .segment-gloss {
        display: inline-block;
        max-width: 100%;
        color: var(--ink);
        line-height: 1.3;
        text-align: center;
        vertical-align: top;
      }

      .segment-meaning {
        display: block;
        margin-top: 0.7mm;
        max-width: 100%;
        color: var(--muted);
        font-family: "Noto Sans KR";
        font-size: 7.8pt;
        font-weight: 500;
        line-height: 1.22;
        letter-spacing: 0;
        text-align: center;
      }

      .segment-meaning strong {
        color: var(--ink);
        font-weight: 700;
      }

      .inline-gloss .slash {
        color: var(--ink-soft);
        font-weight: 400;
        line-height: 1.3;
      }

      .inline-gloss .segment-gloss .gloss::after {
        content: none;
      }

      @page {
        size: A4 portrait;
        margin: 0;
      }

      @media print {
        html,
        body {
          width: 210mm;
          background: #ffffff;
        }

        .screen-bar {
          display: none;
        }

        main {
          display: block;
          padding: 0;
        }

        .page {
          margin: 0;
          border: 0;
          page-break-after: always;
          break-after: page;
        }

        .page:last-child {
          page-break-after: auto;
          break-after: auto;
        }
      }

      @media screen and (max-width: 920px) {
        main {
          padding: 12px;
        }

        .page {
          width: min(100%, 210mm);
          overflow: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="screen-bar">
      <p class="screen-title">__SCREEN_TITLE__</p>
      <button type="button" onclick="window.print()">인쇄</button>
    </header>

    <main id="pages"></main>

    <script>
      const previewWorksheets = [
        {
                "no": "Chocolate",
                "kicker": "Middle Reading",
                "grade": "중등",
                "topic": "초콜릿의 기원과 역사, 그리고 현대 초콜릿 산업의 발달",
                "steps": [
                        {
                                "no": "1",
                                "title": "지문 연습하기",
                                "part": "1-12",
                                "instruction": "정답을 빨간색으로 확인하세요.",
                                "mode": "meaning",
                                "allowPartial": true,
                                "units": [
                                        {
                                                "no": 1,
                                                "en": "Chocolate bars.. / Chocolate ice cream.. / Chocolate milk.. / <strong>Delicious</strong>!",
                                                "hint": "초콜릿 바.. / 초콜릿 아이스크림.. / 초콜릿 우유.. / <strong>맛있는</strong>!"
                                        },
                                        {
                                                "no": 2,
                                                "en": "But / where <strong>does</strong> chocolate <strong>come from</strong>?",
                                                "hint": "하지만 / 초콜릿은 어디에서 <strong>오는가</strong>?"
                                        },
                                        {
                                                "no": 3,
                                                "en": "Chocolate <strong>is made</strong> / from the fruit of cacao trees, / starting about 100 million years ago.",
                                                "hint": "초콜릿은 <strong>만들어진다</strong> / 카카오 나무의 열매로 / 약 1억 년 전부터 시작하여."
                                        },
                                        {
                                                "no": 4,
                                                "en": "The Olmecs of Mexico / were probably the first / to <strong>grow</strong> the cacao plant.",
                                                "hint": "멕시코의 올멕족은 / 아마도 최초의 사람들이었다 / 카카오 식물을 <strong>재배한</strong>."
                                        },
                                        {
                                                "no": 5,
                                                "en": "It is thought / that they <strong>used</strong> the cacao beans / to make drinks, / but there is no written history / for the Olmecs.",
                                                "hint": "여겨진다 / 그들이 카카오콩을 <strong>사용했다고</strong> / 음료를 만들기 위해 / 하지만 기록된 역사는 없다 / 올멕족에 대한."
                                        },
                                        {
                                                "no": 6,
                                                "en": "The Olmecs <strong>passed</strong> their cacao knowledge / to the Ancient Maya of Mexico and Central America, / who <strong>made</strong> chocolate / into a spicy drink used in ceremonies.",
                                                "hint": "올멕족은 카카오 지식을 <strong>전했다</strong> / 멕시코와 중앙아메리카의 고대 마야인들에게 / 그들은 초콜릿을 <strong>만들었다</strong> / 의식에 사용되는 매운 음료로."
                                        },
                                        {
                                                "no": 7,
                                                "en": "Cacao <strong>started</strong> / to become very precious.",
                                                "hint": "카카오는 <strong>시작했다</strong> / 매우 귀중해지기."
                                        },
                                        {
                                                "no": 8,
                                                "en": "Later / the Aztecs <strong>used</strong> cacao for trade / and the cacao seeds as a form of money.",
                                                "hint": "나중에 / 아즈텍인들은 카카오를 무역에 <strong>사용했다</strong> / 그리고 카카오 씨앗을 화폐의 한 형태로."
                                        },
                                        {
                                                "no": 9,
                                                "en": "In 1502, / Christopher Columbus <strong>was</strong> the first European explorer / to come into contact with cacao beans / when he and his crew <strong>captured</strong> a trade ship.",
                                                "hint": "1502년에 / 크리스토퍼 콜럼버스는 최초의 유럽 탐험가<strong>였다</strong> / 카카오콩과 접촉하게 된 / 그와 선원들이 무역선을 <strong>나포했을</strong> 때."
                                        },
                                        {
                                                "no": 10,
                                                "en": "He <strong>presumed</strong> / the beans were a type of almond / and <strong>brought</strong> them back to Europe, / not knowing the potential value of the unusual beans.",
                                                "hint": "그는 <strong>추정했다</strong> / 그 콩들이 아몬드의 한 종류라고 / 그리고 그것들을 유럽으로 <strong>가져갔다</strong> / 그 특이한 콩들의 잠재적 가치를 알지 못한 채."
                                        },

      const worksheets = (() => {

      }
      const screenTitle = document.querySelector(".screen-title");
      if (screenTitle && screenTitle.textContent.includes("__SCREEN_TITLE__")) {
        screenTitle.textContent = "워크북 답지 디자인 템플릿 미리보기";
      }

      const pages = document.querySelector("#pages");
      let pageCounter = 0;

      function value(text) {
        return text || "";
      }

      function practiceValue(text) {
        const html = value(text);
        if (!html) return "";
        const template = document.createElement("template");
        template.innerHTML = html;
        template.content.querySelectorAll("strong").forEach((node) => {
          node.replaceWith(...Array.from(node.childNodes));
        });
        template.content.querySelectorAll(".vocab, .gloss, .answer-fill").forEach((node) => {
          node.removeAttribute("class");
          node.removeAttribute("data-meaning");
        });
        return template.innerHTML;
      }

      function answerValue(text) {
        const html = value(text);
        if (!html) return "";
        const template = document.createElement("template");
        template.innerHTML = html;
        template.content.querySelectorAll("strong").forEach((node) => {
          node.replaceWith(...Array.from(node.childNodes));
        });
        template.content.querySelectorAll(".vocab, .gloss").forEach((node) => {
          node.removeAttribute("class");
          node.removeAttribute("data-meaning");
        });
        template.content.querySelectorAll(".answer-fill").forEach((node) => {
          node.removeAttribute("class");
        });
        return template.innerHTML;
      }

      function answerList(answer) {
        if (Array.isArray(answer)) return answer;
        if (answer === undefined || answer === null || answer === "") return [];
        return [answer];
      }

      function plainText(html) {
        const template = document.createElement("template");
        template.innerHTML = value(html);
        return (template.content.textContent || "").trim();
      }

      function splitBankItems(bank) {
        const text = plainText(bank);
        if (!text) return [];
        const delimiter = text.includes("/") ? "/" : (text.includes(",") ? "," : "");
        return delimiter
          ? text.split(delimiter).map((item) => item.trim()).filter(Boolean)
          : [text];
      }

      function countBlankTargets(html) {
        return (value(html).match(/<span\s+class=["']blank["']\s*><\/span>/g) || []).length;
      }

      function countAnswerTargets(html) {
        const text = value(html);
        const blanks = countBlankTargets(text);
        const choices = (text.match(/\[[^\]]+\]/g) || []).length;
        const parens = (text.match(/\([^()]+\)/g) || []).length;
        return blanks + choices + parens;
      }

      function countItemBlankTargets(item) {
        return ["en", "ko", "prompt"]
          .reduce((total, key) => total + countBlankTargets(item[key]), 0);
      }

      function isCompositionStep(step) {
        return /영작/.test([step.title, step.instruction].filter(Boolean).join(" "));
      }

      function sourceSentenceCount(sheet) {
        const arrays = [
          sheet.sourceSentences,
          sheet.originalSentences,
          sheet.passageSentences,
          sheet.sentences
        ];
        const found = arrays.find((items) => Array.isArray(items) && items.length);
        if (found) return found.length;
        const count = Number(sheet.sourceSentenceCount || sheet.originalSentenceCount || sheet.sentenceCount);
        return Number.isFinite(count) && count > 0 ? count : 0;
      }

      function isSentenceLevelStep(step) {
        if (!list(step.items).length) return false;
        if (step.mode === "meaning" || step.mode === "paragraph-order") return false;
        if (step.allowPartial || step.fullPassage === false) return false;
        const label = [step.no, step.title, step.part, step.instruction, step.mode].filter(Boolean).join(" ");
        return step.fullPassage === true || /빈칸|동사|어법|어휘|해석|순서|배열|영작|문장/.test(label);
      }

      function validateWorksheets() {
        const errors = [];
        list(worksheets).forEach((sheet, sheetIndex) => {
          const sentenceCount = sourceSentenceCount(sheet);
          list(sheet.steps).forEach((step) => {
            if (sentenceCount && isSentenceLevelStep(step)) {
              const itemCount = list(step.items).length;
              if (itemCount !== sentenceCount) {
                errors.push(`${value(sheet.no || sheetIndex + 1)} ${stepLabel(step)}: 원문 문장 ${sentenceCount}개, 문항 ${itemCount}개`);
              }
            }
            list(step.items).forEach((item, itemIndex) => {
              if (item.bank && !isCompositionStep(step)) {
                const bankCount = splitBankItems(item.bank).length;
                const blankCount = countItemBlankTargets(item);
                if (blankCount > 0 && bankCount !== blankCount) {
                  errors.push(`${value(sheet.no || sheetIndex + 1)} ${stepLabel(step)} ${itemIndex + 1}번: 제시어 ${bankCount}개, 빈칸 ${blankCount}개`);
                }
              }

              ["en", "ko", "prompt"].forEach((key) => {
                const answers = answerList(item[`${key}Answers`] || item[`${key}Answer`] || item[`${key}Solution`]);
                if (!answers.length) return;
                const targetCount = countAnswerTargets(item[key]);
                if (targetCount > 0 && answers.length !== targetCount) {
                  errors.push(`${value(sheet.no || sheetIndex + 1)} ${stepLabel(step)} ${itemIndex + 1}번 ${key}: 답 ${answers.length}개, 답칸 ${targetCount}개`);
                }
              });
            });
          });
        });
        return errors;
      }

      function renderValidationErrors(errors, title = "워크북 답지 데이터 검토 오류") {
        document.documentElement.dataset.renderValidation = "failed";
        pages.innerHTML = `
          <article class="page">
            <section class="validation-panel">
              <h1>${title}</h1>
              <ul>${errors.map((error) => `<li>${error}</li>`).join("")}</ul>
            </section>
          </article>
        `;
      }

      function itemAnswer(item, key, html = "") {
        const fieldKeys = [
          `${key}Answers`,
          `${key}Answer`,
          `${key}Solution`
        ];
        const fieldKey = fieldKeys.find((candidate) => item[candidate] !== undefined && item[candidate] !== "");
        if (fieldKey) return item[fieldKey];

        const genericKeys = [
          "answers",
          "answer",
          "solution",
          "answerText",
          "model"
        ];
        const canUseGeneric = /<span class="blank"><\/span>|\[[^\]]+\]/.test(value(html));
        if (!canUseGeneric) return "";
        const foundKey = genericKeys.find((candidate) => item[candidate] !== undefined && item[candidate] !== "");
        return foundKey ? item[foundKey] : "";
      }

      function solutionSpan(answer, className = "solution") {
        return `<span class="${className}">${answerValue(answer)}</span>`;
      }

      function fillAnswerTargets(html, answers) {
        let output = answerValue(html);
        const answerItems = answerList(answers);
        let answerIndex = 0;
        const nextAnswer = () => answerItems[answerIndex++] || "";
        output = output.replace(/<span class="blank"><\/span>/g, () => {
          const answer = nextAnswer();
          return answer ? solutionSpan(answer, "filled-answer") : `<span class="blank"></span>`;
        });
        output = output.replace(/\[[^\]]+\]/g, (match) => {
          const answer = nextAnswer();
          return answer ? solutionSpan(answer) : match;
        });
        output = output.replace(/\([^()]+\)/g, (match) => {
          const answer = nextAnswer();
          return answer ? solutionSpan(answer) : match;
        });
        return output;
      }

      function list(items) {
        return Array.isArray(items) ? items : [];
      }

      function renderWriteLines(count = 1) {
        return Array.from({ length: count }, () => `<div class="write-line"></div>`).join("");
      }

      function splitOutsideTags(html) {
        const parts = [];
        let current = "";
        let inTag = false;
        for (const char of String(html || "")) {
          if (char === "<") {
            inTag = true;
            current += char;
          } else if (char === ">") {
            inTag = false;
            current += char;
          } else if (char === "/" && !inTag) {
            parts.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        parts.push(current);
        return parts;
      }

      function renderInlineGloss(en, hint) {
        const enParts = splitOutsideTags(en);
        const hintParts = splitOutsideTags(hint);
        return enParts
          .map((part, index) => {
            const meaning = (hintParts[index] || "").trim();
            const slash = index < enParts.length - 1 ? "&nbsp;/&nbsp;" : "";
            return `<span class="unit-chunk"><span class="segment-gloss">${part.trim()}<span class="segment-meaning">${meaning}</span></span></span>${slash}`;
          })
          .join("");
      }

      function stepLabel(step) {
        return [step.no, step.title, step.part].filter(Boolean).map(value).join(" ");
      }

      function renderMasthead(sheet, step) {
        return `
          <header class="masthead">
            <div class="mast-meta">
              <span class="lesson-chip">${value(sheet.no || sheet.lesson || "")}</span>
              <span class="kicker">${value(sheet.kicker)}</span>
              ${sheet.grade ? `<span class="grade-chip">${value(sheet.grade)}</span>` : ""}
            </div>
            <div class="step-title">${stepLabel(step)}</div>
          </header>
        `;
      }

      function renderInstruction(step) {
        return `
          <section class="instruction">
            <p class="instruction-text">${value(step.instruction)}</p>
          </section>
        `;
      }

      function renderStudySummary(sheet, step) {
        const shouldShow = step.mode === "meaning" || step.showStudySummary;
        if (!shouldShow || (!sheet.topic && !sheet.answer)) return "";
        return `
          <section class="study-summary">
            ${sheet.topic ? `
              <section class="topic-line">
                <div class="topic-label">주제 한 문장</div>
                <div class="topic-write">${value(sheet.topic)}</div>
              </section>
            ` : ""}
            ${sheet.answer ? `
              <section class="answer-line">
                <div class="answer-label">${value(sheet.answer.label || "정답 확인")}</div>
                <div class="answer-write">${value(sheet.answer.text)}</div>
                <div class="answer-check">${value(sheet.answer.check || "검토 완료")}</div>
              </section>
            ` : ""}
          </section>
        `;
      }

      function renderField(field, item) {
        const className = field.className || "";
        const html = fillAnswerTargets(item[field.key], itemAnswer(item, field.key, item[field.key]));
        if (!html) return "";
        return `
          <div class="field-row">
            ${field.label ? `<div class="field-label">${value(field.label)}</div>` : ""}
            <p class="${className}">${html}</p>
          </div>
        `;
      }

      function renderBank(item) {
        if (!item.bank) return "";
        return `
          <div class="word-bank">
            <span class="bank-label">${value(item.bankLabel || "제시어")}</span>
            <span class="bank-text">${practiceValue(item.bank)}</span>
          </div>
        `;
      }

      function renderAnswerBox(item) {
        const answer = item.answer || item.answerText || item.solution || item.model || item.enAnswer || item.koAnswer;
        const lineCount = Math.max(2, item.lines || 2);
        const notebookHeight = lineCount * 7;
        const height = item.keepAnswerHeight ? (item.answerHeight || `${notebookHeight}mm`) : `${notebookHeight}mm`;
        if (answer) {
          return `
            <div class="solution-box" style="--answer-height: ${height}">
              <p class="solution-text">${answerValue(answer)}</p>
            </div>
          `;
        }
        if (item.enAnswers || item.koAnswers || item.answers) return "";
        if (!item.lines && !item.answerHeight) return "";
        return `
          <div class="write-box" style="--answer-height: ${height}">
            ${item.writeLabel ? `<div class="write-label">${value(item.writeLabel)}</div>` : ""}
            ${renderWriteLines(item.lines || 2)}
          </div>
        `;
      }

      function renderMeaning(step) {
        const units = list(step.units).length ? step.units : list(step.items);
        return `
          <section class="work-area meaning-work-area">
            <section class="meaning-board">
              <div class="meaning-board-head">
                <div>No.</div>
                <div>원문 의미 단위</div>
              </div>
              <div class="meaning-list">
                ${units.map((unit, index) => `
                  <section class="meaning-row">
                    <div class="meaning-cell unit-no">${String(value(unit.no || index + 1)).padStart(2, "0")}</div>
                    <div class="meaning-cell text-cell">
                      <p class="english inline-gloss">${renderInlineGloss(unit.en, unit.hint)}</p>
                      ${unit.lines ? `<div class="lines">${renderWriteLines(unit.lines)}</div>` : ""}
                    </div>
                  </section>
                `).join("")}
              </div>
            </section>
          </section>
        `;
      }

      function renderParallel(step) {
        const fields = list(step.fields).length
          ? step.fields
          : [
              { key: "en", className: "english" },
              { key: "ko", className: "korean" }
            ];
        const isReading = step.layout === "reading";
        return `
          <section class="work-area item-work-area">
            <div class="item-list">
              ${list(step.items).map((item, index) => `
                <section class="practice-item">
                  <div class="item-no">${value(item.no || index + 1)}</div>
                  <div class="item-main ${isReading ? "reading-grid" : ""}">
                    ${fields.map((field) => renderField(field, item)).join("")}
                    ${renderBank(item)}
                    ${renderAnswerBox(item)}
                  </div>
                </section>
              `).join("")}
            </div>
          </section>
        `;
      }

      function renderWriting(step) {
        const isComposition = /영작/.test([step.title, step.instruction].filter(Boolean).join(" "));
        return `
          <section class="work-area item-work-area">
            <div class="item-list">
              ${list(step.items).map((item, index) => `
                <section class="practice-item">
                  <div class="item-no">${value(item.no || index + 1)}</div>
                  <div class="item-main">
                    ${item.ko ? `<p class="korean">${practiceValue(item.ko)}</p>` : ""}
                    ${!isComposition && item.en ? `<p class="english">${fillAnswerTargets(item.en, itemAnswer(item, "en", item.en))}</p>` : ""}
                    ${item.prompt ? `<p class="prompt">${practiceValue(item.prompt)}</p>` : ""}
                    ${renderBank(item)}
                    ${renderAnswerBox({ ...item, lines: item.lines || 3 })}
                  </div>
                </section>
              `).join("")}
            </div>
          </section>
        `;
      }

      function renderCorrection(step) {
        const rows = list(step.corrections).length ? list(step.corrections) : list(step.rows);
        return `
          <section class="work-area">
            <div class="correction-passage">
              <p class="english">${practiceValue(step.passage)}</p>
            </div>
            <div class="correction-rows">
              ${rows.map((row, index) => `
                <div class="correction-row">
                  <span class="correction-no">(${value(row.no || index + 1)})</span>
                  <span class="${row.wrong || row.before || row.original ? "solution-line" : "write-line"}">${answerValue(row.wrong || row.before || row.original)}</span>
                  <span class="arrow">&rarr;</span>
                  <span class="${row.correct || row.after || row.answer || row.solution ? "solution-line" : "write-line"}">${answerValue(row.correct || row.after || row.answer || row.solution)}</span>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }

      function renderParagraphOrder(step) {
        const sequenceAnswer = answerList(step.sequenceAnswer || step.answer || step.solution);
        return `
          <section class="work-area">
            <div class="paragraph-list">
              ${step.intro ? `<p class="english">${practiceValue(step.intro)}</p>` : ""}
              ${list(step.blocks).map((block) => `
                <div class="paragraph-block">
                  <div class="paragraph-label">${value(block.label)}</div>
                  <p class="paragraph">${practiceValue(block.text)}</p>
                </div>
              `).join("")}
              ${step.outro ? `<p class="english">${practiceValue(step.outro)}</p>` : ""}
              <div class="sequence-row">
                ${sequenceAnswer.length
                  ? sequenceAnswer.map((answer, index) => `
                    ${index ? `<span class="sequence-arrow">&rarr;</span>` : ""}
                    <span class="solution-slot">${answerValue(answer)}</span>
                  `).join("")
                  : Array.from({ length: step.sequenceSlots || 3 }, (_, index) => `
                  ${index ? `<span class="sequence-arrow">&rarr;</span>` : ""}
                  <span class="sequence-slot"></span>
                `).join("")}
              </div>
            </div>
          </section>
        `;
      }

      function renderStepBody(step) {
        if (step.mode === "meaning") return renderMeaning(step);
        if (step.mode === "writing") return renderWriting(step);
        if (step.mode === "correction") return renderCorrection(step);
        if (step.mode === "paragraph-order") return renderParagraphOrder(step);
        return renderParallel(step);
      }

      function renderFooter(sheet) {
        pageCounter += 1;
        return `
          <footer class="footer">
            <span></span>
            <span>- ${pageCounter} -</span>
            <span><img class="footer-logo-mark" src="assets/yonjogyo-logo-footer.png" alt="" /></span>
          </footer>
        `;
      }

      function renderStep(sheet, step) {
        return `
          <article class="page">
            <div class="sheet">
              ${renderMasthead(sheet, step)}
              ${renderInstruction(step)}
              ${renderStudySummary(sheet, step)}
              ${renderStepBody(step)}
              ${renderFooter(sheet)}
            </div>
          </article>
        `;
      }

      function renderWorksheet(sheet) {
        return list(sheet.steps).map((step) => renderStep(sheet, step)).join("");
      }

      function detectPageOverflowErrors() {
        const tolerance = 2;
        return Array.from(document.querySelectorAll(".page")).flatMap((page, index) => {
          const sheet = page.querySelector(".sheet") || page;
          const overflow = Math.max(
            sheet.scrollHeight - sheet.clientHeight,
            page.scrollHeight - page.clientHeight
          );
          const sheetRect = sheet.getBoundingClientRect();
          const childBottom = Array.from(sheet.children).reduce((bottom, child) => {
            const style = window.getComputedStyle(child);
            if (style.display === "none") return bottom;
            return Math.max(bottom, child.getBoundingClientRect().bottom);
          }, sheetRect.top);
          const visualOverflow = childBottom - sheetRect.bottom;
          const overflowAmount = Math.ceil(Math.max(overflow, visualOverflow));
          if (overflowAmount <= tolerance) return [];
          const stepTitle = page.querySelector(".step-title")?.textContent.trim() || "단계 정보 없음";
          return [`${index + 1}쪽 ${stepTitle}: 내용이 페이지 하단을 ${overflowAmount}px 넘습니다. 같은 단계의 part 문항 수를 줄이세요.`];
        });
      }

      function validateRenderedPages() {
        const overflowErrors = detectPageOverflowErrors();
        if (overflowErrors.length) {
          renderValidationErrors(overflowErrors, "페이지 넘침 검토 오류");
          throw new Error(overflowErrors.join("\\n"));
        }
        document.documentElement.dataset.renderValidation = "ok";
      }

      const validationErrors = validateWorksheets();
      if (validationErrors.length) {
        renderValidationErrors(validationErrors);
        throw new Error(validationErrors.join("\\n"));
      }

      pages.innerHTML = list(worksheets).map(renderWorksheet).join("");
      validateRenderedPages();
    </script>
  </body>
</html>
